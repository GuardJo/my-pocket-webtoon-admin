spring:
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 1000
  datasource:
    url: jdbc:tc:postgresql:17.5:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
jwt:
  secret: test-secret-key-for-jwt-provider-unit-test-1234
  expiration-millis: 3_600_000

storage:
  local:
    upload-path: "./storage"
    url-prefix: "/uploads"
    public-base-url: ""
  r2:
    account-id: ${R2_ACCOUNT_ID:test-id}
    bucket-name: ${R2_BUCKET_NAME:test-bucket}
    public-base-url: ${R2_PUBLIC_URL:http://localhost:8080}
    access-key: ${R2_ACCESS_KEY:test-access-key}
    secret-key: ${R2_SECRET_KEY:test-secret-key}
  upload-concurrency: 12
