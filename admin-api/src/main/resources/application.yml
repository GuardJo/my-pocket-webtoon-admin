spring:
  application:
    name: admin-api
  docker:
    compose:
      enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/my-pocket-webtoon
    username: manager
    password: manager0
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 1000
  servlet:
    multipart:
      max-file-size: 4GB
      max-request-size: 10GB
server:
  port: 8080

jwt:
  secret: ${JWT_SECRET_KEY:test-secret-key-for-jwt-provider-unit-test-1234}
  expiration-millis: 3_600_000
